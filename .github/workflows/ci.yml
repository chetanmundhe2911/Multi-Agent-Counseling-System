name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz graphviz-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            streamlit_app/requirements.txt

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f streamlit_app/requirements.txt ]; then pip install -r streamlit_app/requirements.txt; fi

      - name: Syntax check (compile all Python files)
        run: |
          python -m compileall -q app main.py streamlit_app/main_ui.py

      - name: Smoke test core imports
        run: |
          python - <<'PY'
          from app.agents.orchestrator.orchestrator import Orchestrator
          from app.knowledge.loader import load_knowledge_base_from_reports
          from app.state.state import AgentState
          print("Core imports OK")
          PY

      - name: Run tests (if present)
        run: |
          if [ -d tests ] || [ -d test ]; then
            pytest -q
          else
            echo "No tests directory found; skipping pytest."
          fi
